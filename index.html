<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Stack Dev — Learning Path</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0f;
      --bg2: #141416;
      --bg3: #1a1a1e;
      --bg4: #222228;
      --border: rgba(255, 255, 255, 0.07);
      --border2: rgba(255, 255, 255, 0.12);
      --text: #f0ede8;
      --text2: #9997a0;
      --text3: #5c5a65;
      --accent: #e8a84c;
      --accent2: #f0c278;
      --accent-bg: rgba(232, 168, 76, 0.1);
      --accent-border: rgba(232, 168, 76, 0.25);
      --green: #4caf7d;
      --green-bg: rgba(76, 175, 125, 0.1);
      --blue: #5b9bd5;
      --blue-bg: rgba(91, 155, 213, 0.1);
      --purple: #9b82f3;
      --purple-bg: rgba(155, 130, 243, 0.1);
      --coral: #e87c5a;
      --coral-bg: rgba(232, 124, 90, 0.1);
      --teal: #4dbfaa;
      --teal-bg: rgba(77, 191, 170, 0.1);
      --radius: 10px;
      --radius-sm: 6px;
      --sidebar-w: 280px;
      --header-h: 56px;
    }

    .light {
      --bg: #f7f5f0;
      --bg2: #ffffff;
      --bg3: #f0ede6;
      --bg4: #e8e4dc;
      --border: rgba(0, 0, 0, 0.07);
      --border2: rgba(0, 0, 0, 0.12);
      --text: #1a1814;
      --text2: #6b6560;
      --text3: #a09890;
      --accent: #c17a1a;
      --accent2: #a86510;
      --accent-bg: rgba(193, 122, 26, 0.08);
      --accent-border: rgba(193, 122, 26, 0.2);
      --green: #2d8a55;
      --green-bg: rgba(45, 138, 85, 0.08);
      --blue: #2563a8;
      --blue-bg: rgba(37, 99, 168, 0.08);
      --purple: #6b4ec9;
      --purple-bg: rgba(107, 78, 201, 0.08);
      --coral: #c05535;
      --coral-bg: rgba(192, 85, 53, 0.08);
      --teal: #1e8a78;
      --teal-bg: rgba(30, 138, 120, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      scroll-behavior: smooth
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background .3s, color .3s
    }

    a {
      color: inherit;
      text-decoration: none
    }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      color: inherit
    }

    /* HEADER */
    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--header-h);
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px 0 0;
      z-index: 100;
      gap: 0
    }

    #logo-area {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-right: 1px solid var(--border)
    }

    #logo-area .logo-mark {
      width: 28px;
      height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 800;
      font-size: 14px;
      color: #000
    }

    #logo-area .logo-text {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: -0.3px
    }

    #logo-area .logo-text span {
      color: var(--accent)
    }

    #header-right {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px
    }

    #search-wrap {
      flex: 1;
      max-width: 340px;
      position: relative
    }

    #search-wrap i {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: var(--text3);
      pointer-events: none
    }

    #search {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px 7px 32px;
      font-size: 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border .2s
    }

    #search:focus {
      border-color: var(--accent-border)
    }

    #search::placeholder {
      color: var(--text3)
    }

    #progress-global {
      flex: 1;
      max-width: 200px
    }

    #progress-global .prog-label {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between
    }

    #prog-bar-wrap {
      height: 3px;
      background: var(--bg4);
      border-radius: 2px
    }

    #prog-bar-fill {
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      transition: width .5s
    }

    #theme-btn {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      background: var(--bg3);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--text2);
      transition: all .2s;
      flex-shrink: 0
    }

    #theme-btn:hover {
      border-color: var(--border2);
      color: var(--text)
    }

    /* LAYOUT */
    #layout {
      display: flex;
      padding-top: var(--header-h);
      min-height: 100vh
    }

    /* SIDEBAR */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg2);
      border-right: 1px solid var(--border);
      position: fixed;
      top: var(--header-h);
      left: 0;
      bottom: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 16px 0 40px
    }

    #sidebar::-webkit-scrollbar {
      width: 4px
    }

    #sidebar::-webkit-scrollbar-track {
      background: transparent
    }

    #sidebar::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 2px
    }

    .phase-group {
      margin-bottom: 4px
    }

    .phase-group-header {
      padding: 14px 20px 6px;
      display: flex;
      align-items: center;
      gap: 8px
    }

    .phase-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .phase-group-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace
    }

    .sidebar-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 20px;
      cursor: pointer;
      border-radius: 0;
      transition: background .15s;
      position: relative;
      border-left: 2px solid transparent
    }

    .sidebar-item:hover {
      background: var(--bg3)
    }

    .sidebar-item.active {
      background: var(--accent-bg);
      border-left-color: var(--accent)
    }

    .sidebar-item .mod-num {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      width: 22px;
      flex-shrink: 0
    }

    .sidebar-item .mod-name {
      font-size: 14px;
      color: var(--text2);
      flex: 1;
      line-height: 1.3
    }

    .sidebar-item.active .mod-name {
      color: var(--text);
      font-weight: 500
    }

    .sidebar-item .check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1.5px solid var(--border2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      color: transparent;
      transition: all .2s
    }

    .sidebar-item .check.done {
      background: var(--green);
      border-color: var(--green);
      color: #000
    }

    /* MAIN */
    #main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
      padding: 40px 48px 80px
    }

    @media(max-width:1100px) {
      #main {
        padding: 32px 28px 60px
      }
    }

    /* MODULE PAGE */
    .mod-page {
      display: none;
      animation: fadeIn .25s ease
    }

    .mod-page.active {
      display: block
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* MODULE HEADER */
    .mod-header {
      margin-bottom: 32px
    }

    .mod-header .phase-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid;
      margin-bottom: 14px
    }

    .mod-header h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 37px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -1px;
      margin-bottom: 10px
    }

    .mod-header .subtitle {
      font-size: 17px;
      color: var(--text2);
      line-height: 1.6;
      max-width: 620px
    }

    .mod-meta-row {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap
    }

    .meta-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 20px;
      font-family: 'JetBrains Mono', monospace
    }

    /* OVERVIEW CARDS */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 36px
    }

    .ov-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px
    }

    .ov-card .ov-val {
      font-family: 'Outfit', sans-serif;
      font-size: 23px;
      font-weight: 700;
      margin-bottom: 3px
    }

    .ov-card .ov-lbl {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em
    }

    /* SECTION HEADERS */
    .section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 19px;
      font-weight: 700;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    /* SKILLS */
    .skills-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 32px
    }

    .skill-tag {
      font-size: 13px;
      padding: 5px 12px;
      border-radius: 20px;
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text2);
      font-family: 'JetBrains Mono', monospace
    }

    /* WEEKLY PLAN */
    .week-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 36px
    }

    .week-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: border-color .2s
    }

    .week-card:hover {
      border-color: var(--border2)
    }

    .week-head {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 18px;
      cursor: pointer;
      user-select: none
    }

    .week-num-badge {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      padding: 3px 9px;
      border-radius: 20px;
      flex-shrink: 0;
      background: var(--bg4);
      color: var(--text3);
      border: 1px solid var(--border)
    }

    .week-title-text {
      font-size: 15px;
      font-weight: 500;
      flex: 1
    }

    .week-hours {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace
    }

    .diff-row {
      display: flex;
      gap: 3px
    }

    .diff-pip {
      width: 14px;
      height: 3px;
      border-radius: 2px
    }

    .week-chev {
      font-size: 14px;
      color: var(--text3);
      transition: transform .25s
    }

    .week-chev.open {
      transform: rotate(180deg)
    }

    .week-body {
      display: none;
      border-top: 1px solid var(--border);
      padding: 18px 18px 16px
    }

    .week-body.open {
      display: block
    }

    .topic-item {
      display: flex;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border)
    }

    .topic-item:last-of-type {
      border-bottom: none
    }

    .topic-bullet {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0
    }

    .topic-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 3px
    }

    .topic-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.6
    }

    .week-footer {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px
    }

    /* PROJECT BOX */
    .project-box {
      flex: 1;
      min-width: 220px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px
    }

    .project-box .proj-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 5px
    }

    .project-box .proj-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 4px
    }

    .project-box .proj-desc {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.5
    }

    /* RESOURCES */
    .resources-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 10px;
      margin-bottom: 36px
    }

    .res-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      transition: border-color .2s, background .2s;
      cursor: pointer
    }

    .res-card:hover {
      border-color: var(--border2);
      background: var(--bg3)
    }

    .res-icon {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0
    }

    .res-name {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 3px
    }

    .res-type {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace
    }

    /* TIP BOX */
    .tip-box {
      background: var(--accent-bg);
      border: 1px solid var(--accent-border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 32px;
      display: flex;
      gap: 12px
    }

    .tip-box .tip-icon {
      font-size: 19px;
      flex-shrink: 0;
      margin-top: 1px
    }

    .tip-box .tip-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.6
    }

    .tip-box .tip-label {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 5px
    }

    /* MARK DONE BTN */
    .done-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 500;
      border: 1.5px solid var(--border2);
      color: var(--text2);
      transition: all .2s;
      font-family: 'Inter', sans-serif
    }

    .done-btn:hover {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-bg)
    }

    .done-btn.done {
      border-color: var(--green);
      color: var(--green);
      background: var(--green-bg)
    }

    /* DASHBOARD */
    #dashboard {
      animation: fadeIn .3s ease
    }

    .dash-hero {
      margin-bottom: 48px
    }

    .dash-hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 49px;
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 12px
    }

    .dash-hero h1 span {
      color: var(--accent)
    }

    .dash-hero p {
      font-size: 17px;
      color: var(--text2);
      max-width: 500px;
      line-height: 1.6
    }

    .dash-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 48px
    }

    .dash-stat {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      position: relative;
      overflow: hidden
    }

    .dash-stat::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px
    }

    .dash-stat.s1::before {
      background: var(--blue)
    }

    .dash-stat.s2::before {
      background: var(--accent)
    }

    .dash-stat.s3::before {
      background: var(--green)
    }

    .dash-stat.s4::before {
      background: var(--purple)
    }

    .dash-stat .sv {
      font-family: 'Outfit', sans-serif;
      font-size: 29px;
      font-weight: 800;
      margin-bottom: 2px
    }

    .dash-stat .sl {
      font-size: 13px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace
    }

    .phases-overview {
      display: flex;
      flex-direction: column;
      gap: 16px
    }

    .phase-ov-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      cursor: pointer;
      transition: border-color .2s, background .2s
    }

    .phase-ov-card:hover {
      border-color: var(--border2);
      background: var(--bg3)
    }

    .phase-ov-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px
    }

    .phase-ov-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text3)
    }

    .phase-ov-name {
      font-family: 'Outfit', sans-serif;
      font-size: 19px;
      font-weight: 700;
      flex: 1
    }

    .phase-ov-count {
      font-size: 12px;
      color: var(--text3);
      font-family: 'JetBrains Mono', monospace
    }

    .phase-ov-desc {
      font-size: 14px;
      color: var(--text2);
      line-height: 1.6;
      margin-bottom: 12px
    }

    .phase-mod-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px
    }

    .phase-mod-chip {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--bg4);
      color: var(--text3);
      border: 1px solid var(--border)
    }

    .phase-mod-chip.done-chip {
      background: var(--green-bg);
      color: var(--green);
      border-color: rgba(76, 175, 125, 0.2)
    }

    .phase-prog-bar {
      height: 3px;
      background: var(--bg4);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden
    }

    .phase-prog-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .5s
    }

    /* SEARCH */
    .search-results {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 24px
    }

    .search-result-item {
      padding: 12px 18px;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      display: flex;
      align-items: center;
      gap: 12px
    }

    .search-result-item:last-child {
      border-bottom: none
    }

    .search-result-item:hover {
      background: var(--bg3)
    }

    .sr-mod {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text3);
      width: 60px
    }

    .sr-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1
    }

    .sr-phase {
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px;
      border-radius: 10px;
      background: var(--bg4);
      color: var(--text3)
    }

    /* SCROLLBAR */
    #main::-webkit-scrollbar {
      width: 0
    }

    #sidebar-toggle {
      display: none;
      align-items: center;

                { name: 'Core data structures', desc: 'Arrays, linked lists, stacks, queues, hash maps, trees, graphs. Know their time and space complexities. Implement each from scratch in JavaScript.' },
                { name: 'Sorting & searching', desc: 'Bubble, selection, insertion, merge, quick sort. Binary search. When to use each. Understanding O(n log n) vs O(n²).' },
                { name: 'Common problem patterns', desc: 'Two pointers, sliding window, fast & slow pointers, merge intervals, tree BFS/DFS, dynamic programming basics. Recognising which pattern fits which problem.' },
              ],
              project: { name: 'LeetCode practice', desc: 'Solve 30 problems: 10 easy, 15 medium, 5 hard. Focus on arrays, strings, hash maps, and binary trees — the most common interview topics. Time yourself to simulate interview pressure.' },
              resources: [
                { name: 'Neetcode.io (structured problems)', url: 'https://neetcode.io/', type: 'Practice' },
                { name: 'Blind 75 list', url: 'https://leetcode.com/discuss/general-discussion/460599/blind-75-leetcode-questions', type: 'Reference' },
              ]
            },
            {
              num: 2, title: 'System design', hours: 10, diff: 5, color: 'var(--coral)',
              topics: [
                { name: 'System design fundamentals', desc: 'Scalability, reliability, availability. Horizontal vs vertical scaling. Load balancers. CAP theorem. SQL vs NoSQL trade-offs.' },
                { name: 'Common system design patterns', desc: 'Design URL shortener, rate limiter, chat system, social media feed, file storage service. Each follows a pattern: requirements → estimation → design → deep dive.' },
                { name: 'Database design at scale', desc: 'Sharding, replication, read replicas. Caching strategies (CDN, Redis). Message queues for async processing. Event-driven architecture basics.' },
              ],
              project: { name: 'System design presentation', desc: 'Design 3 systems on paper/Excalidraw: a URL shortener, a real-time chat platform, and a social media news feed. Present your design out loud as if in an interview.' },
              resources: [
                { name: 'System Design Primer (free)', url: 'https://github.com/donnemartin/system-design-primer', type: 'Free book' },
                { name: 'ByteByteGo newsletter', url: 'https://blog.bytebytego.com/', type: 'Newsletter' },
              ]
            },
            {
              num: 3, title: 'Portfolio & behavioural prep', hours: 10, diff: 2, color: 'var(--coral)',
              topics: [
                { name: 'Portfolio polishing', desc: 'Every project needs: a live URL, a README with screenshots and setup instructions, and a clear description of the problem it solves. Remove unfinished projects.' },
                { name: 'The STAR method', desc: 'Situation, Task, Action, Result. Write 8–10 STAR stories from your projects covering: a challenge overcome, a technical decision made, a mistake and lesson learned, leadership.' },
                { name: 'Technical communication', desc: 'Practice explaining your projects clearly to non-technical people. Then explain them to technical people. The ability to context-switch communication style is valued highly.' },
              ],
              project: { name: 'Portfolio site v2', desc: 'Rebuild your portfolio with your best 3–4 projects prominently featured. Each project card should link to live demo and GitHub. Include a clear "hire me" call to action.' },
              resources: [
                { name: 'Levels.fyi (salary data)', url: 'https://www.levels.fyi/', type: 'Reference' },
              ]
            },
            {
              num: 4, title: 'Mock interviews & job applications', hours: 8, diff: 3, color: 'var(--coral)',
              topics: [
                { name: 'Mock technical interviews', desc: 'Use Pramp or Interviewing.io for free peer mock interviews. Do at least 5 mock sessions before applying. The first real interview should not be your first interview.' },
                { name: 'Job application strategy', desc: 'Target companies with a real product you understand. Personalise every cover letter. Apply to 5–8 roles per week, not 50. Track applications in a spreadsheet.' },
                { name: 'Negotiating offers', desc: 'Always negotiate. The first offer is almost never the final offer. Research market rates on Levels.fyi and LinkedIn Salary. Negotiate total compensation, not just base salary.' },
              ],
              project: { name: 'Active job search', desc: 'Have 3 deployed projects, an updated LinkedIn, a clean GitHub, and a polished resume. Apply to 30 targeted companies over 4 weeks. Track every application and follow up.' },
              resources: [
                { name: 'Pramp (mock interviews)', url: 'https://www.pramp.com/', type: 'Free tool' },
                { name: 'Interviewing.io', url: 'https://interviewing.io/', type: 'Tool' },
              ]
            }
          ]
        }
      }
    };

    let currentPage = 'dashboard';
    let completedModules = JSON.parse(localStorage.getItem('fs_completed') || '[]');
    let lightMode = localStorage.getItem('fs_theme') === 'light';

    if (lightMode) document.documentElement.classList.add('light');

    function getPhase(id) { return DATA.phases.find(p => p.id === id); }
    function getModule(num) { return DATA.modules[num]; }

    function saveProgress() { localStorage.setItem('fs_completed', JSON.stringify(completedModules)); }

    function updateProgressBar() {
      const total = Object.keys(DATA.modules).length;
      const done = completedModules.length;
      const pct = Math.round((done / total) * 100);
      document.getElementById('prog-bar-fill').style.width = pct + '%';
      document.getElementById('prog-pct').textContent = pct + '%';
    }

    function buildSidebar() {
      const sb = document.getElementById('sidebar');
      sb.innerHTML = '';
      DATA.phases.forEach(phase => {
        const group = document.createElement('div');
        group.className = 'phase-group';
        group.innerHTML = `<div class="phase-group-header"><div class="phase-dot" style="background:${phase.color}"></div><span class="phase-group-label">Phase ${phase.num} — ${phase.label}</span></div>`;
        phase.modules.forEach(mNum => {
          const mod = getModule(mNum);
          const done = completedModules.includes(mNum);
          const item = document.createElement('div');
          item.className = 'sidebar-item' + (currentPage == mNum ? ' active' : '');
          item.id = 'sb-' + mNum;
          item.innerHTML = `<span class="mod-num">${String(mNum).padStart(2, '0')}</span><span class="mod-name">${mod.title}</span><div class="check ${done ? 'done' : ''}">✓</div>`;
          item.onclick = () => navigate(mNum);
          group.appendChild(item);
        });
        sb.appendChild(group);
      });
    }

    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      const backdrop = document.getElementById('sidebar-backdrop');
      sb.classList.toggle('open');
      backdrop.classList.toggle('open');
    }

    function navigate(page) {
      currentPage = page;
      document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
      if (page !== 'dashboard') {
        const el = document.getElementById('sb-' + page);
        if (el) el.classList.add('active');
      }
      render();
      document.getElementById('main').scrollTop = 0;
      
      if (window.innerWidth <= 900) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('sidebar-backdrop').classList.remove('open');
      }
    }

    function phaseColor(phaseId) { return getPhase(phaseId)?.color || 'var(--accent)'; }

    function renderDashboard() {
      const total = Object.keys(DATA.modules).length;
      const done = completedModules.length;
      const totalHours = Object.values(DATA.modules).reduce((a, m) => a + (m.hours || 0), 0);
      const totalWeeks = Object.values(DATA.modules).reduce((a, m) => a + (m.weeks ? m.weeks.length : 0), 0);
      let html = `<div id="dashboard">
  <div class="dash-hero">
    <h1>Master <span>Full Stack</span><br>Development</h1>
    <p>25 modules · 5 phases · ${totalHours}+ hours of curated study. Click any phase or module to start learning.</p>
  </div>
  <div class="dash-stats">
    <div class="dash-stat s1"><div class="sv">${total}</div><div class="sl">Total modules</div></div>
    <div class="dash-stat s2"><div class="sv">${done}</div><div class="sl">Completed</div></div>
    <div class="dash-stat s3"><div class="sv">${totalHours}+</div><div class="sl">Hours of content</div></div>
    <div class="dash-stat s4"><div class="sv">${totalWeeks}</div><div class="sl">Study weeks</div></div>
  </div>
  <div class="section-title">Learning phases</div>
  <div class="phases-overview">`;
      DATA.phases.forEach(phase => {
        const pDone = phase.modules.filter(m => completedModules.includes(m)).length;
        const pPct = Math.round((pDone / phase.modules.length) * 100);
        const chips = phase.modules.map(m => {
          const mod = getModule(m);
          const isDone = completedModules.includes(m);
          return `<span class="phase-mod-chip ${isDone ? 'done-chip' : ''}" onclick="event.stopPropagation();navigate(${m})">${mod.title}</span>`;
        }).join('');
        html += `<div class="phase-ov-card" onclick="navigate(${phase.modules[0]})">
      <div class="phase-ov-header">
        <span class="phase-ov-num">Phase ${phase.num}</span>
        <span class="phase-ov-name" style="color:${phase.color}">${phase.label}</span>
        <span class="phase-ov-count">${pDone}/${phase.modules.length} modules · ${pPct}%</span>
      </div>
      <div class="phase-ov-desc">${phase.desc}</div>
      <div class="phase-mod-chips">${chips}</div>
      <div class="phase-prog-bar"><div class="phase-prog-fill" style="background:${phase.color};width:${pPct}%"></div></div>
    </div>`;
      });
      html += '</div></div>';
      return html;
    }

    function renderModule(num) {
      const mod = getModule(num);
      const phase = getPhase(mod.phase);
      const isDone = completedModules.includes(num);
      const color = phase.color;

      let html = `<div class="mod-header">
    <div class="phase-tag" style="color:${color};background:${phase.bg};border-color:${color}40">
      Phase ${phase.num} · ${phase.label}
    </div>
    <h1>Module ${String(num).padStart(2, '0')} — ${mod.title}</h1>
    <div class="subtitle">${mod.subtitle}</div>
    <div class="mod-meta-row">
      <div class="meta-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>${mod.hours}+ hours</div>
      <div class="meta-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>${mod.weeks ? mod.weeks.length : 0} week${(mod.weeks ? mod.weeks.length : 0) > 1 ? 's' : ''}</div>
      <div class="meta-chip"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>${mod.topics} topics</div>
    </div>
  </div>`;

      html += `<div class="tip-box"><div class="tip-icon">💡</div><div><div class="tip-label">Pro tip</div><div class="tip-text">${mod.tip}</div></div></div>`;

      html += `<div class="section-title">Skills you'll learn</div>
  <div class="skills-wrap">${mod.skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>`;

      html += `<div class="section-title">Weekly study plan</div><div class="week-list">`;
      mod.weeks.forEach((w, wi) => {
        const diffs = Array.from({ length: 5 }, (_, i) => `<div class="diff-pip" style="background:${i < w.diff ? w.color : 'var(--bg4)'}"></div>`).join('');
        const topicsHtml = w.topics.map(t => `<div class="topic-item"><div class="topic-bullet" style="background:${w.color}"></div><div><div class="topic-name">${t.name}</div><div class="topic-desc">${t.desc}</div></div></div>`).join('');
        const resHtml = w.resources.map(r => `<a class="res-card" href="${r.url}" target="_blank"><div class="res-icon" style="background:${phase.bg}"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></div><div><div class="res-name">${r.name}</div><div class="res-type">${r.type}</div></div></a>`).join('');
        html += `<div class="week-card">
      <div class="week-head" onclick="toggleWeek(this)">
        <span class="week-num-badge">Week ${w.num}</span>
        <span class="week-title-text">${w.title}</span>
        <span class="week-hours">${w.hours} hrs</span>
        <div class="diff-row">${diffs}</div>
        <svg class="week-chev ${wi === 0 ? 'open' : ''}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="week-body ${wi === 0 ? 'open' : ''}">
        ${topicsHtml}
        <div class="week-footer">
          <div class="project-box">
            <div class="proj-label">Mini project</div>
            <div class="proj-name">${w.project.name}</div>
            <div class="proj-desc">${w.project.desc}</div>
          </div>
        </div>
        ${resHtml.length ? `<div class="section-title" style="margin-top:16px;font-size: 15px">Resources</div><div class="resources-grid">${resHtml}</div>` : ''}
      </div>
    </div>`;
      });
      html += `</div>`;

      const prevNum = num > 1 ? num - 1 : null;
      const nextNum = DATA.modules[num + 1] ? num + 1 : null;
      html += `<div style="display:flex;gap:12px;align-items:center;margin-top:8px;flex-wrap:wrap">
    <button class="done-btn ${isDone ? 'done' : ''}" onclick="toggleDone(${num},this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>
      ${isDone ? 'Completed ✓' : 'Mark as complete'}
    </button>
    ${prevNum ? `<button class="done-btn" onclick="navigate(${prevNum})" style="margin-left:auto">← Module ${prevNum}</button>` : ''}
    ${nextNum ? `<button class="done-btn" onclick="navigate(${nextNum})" style="${prevNum ? '' : 'margin-left:auto'}">Module ${nextNum} →</button>` : ''}
  </div>`;

      return html;
    }

    function toggleWeek(header) {
      const body = header.nextElementSibling;
      const chev = header.querySelector('.week-chev');
      const isOpen = body.classList.contains('open');
      body.classList.toggle('open', !isOpen);
      chev.classList.toggle('open', !isOpen);
    }

    function toggleDone(num, btn) {
      if (completedModules.includes(num)) {
        completedModules = completedModules.filter(n => n !== num);
        btn.classList.remove('done');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Mark as complete`;
      } else {
        completedModules.push(num);
        btn.classList.add('done');
        btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> Completed ✓`;
      }
      saveProgress();
      updateProgressBar();
      buildSidebar();
    }

    function render() {
      const area = document.getElementById('content-area');
      if (currentPage === 'dashboard') {
        area.innerHTML = renderDashboard();
      } else {
        area.innerHTML = renderModule(currentPage);
      }
    }

    function doSearch(q) {
      const area = document.getElementById('content-area');
      if (!q.trim()) { render(); return; }
      const ql = q.toLowerCase();
      const results = Object.entries(DATA.modules).filter(([num, mod]) =>
        mod.title.toLowerCase().includes(ql) ||
        mod.subtitle.toLowerCase().includes(ql) ||
        mod.skills.some(s => s.toLowerCase().includes(ql)) ||
        mod.weeks.some(w => w.title.toLowerCase().includes(ql) || w.topics.some(t => t.name.toLowerCase().includes(ql)))
      );
      let html = `<div style="font-size: 14px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:16px">${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"</div>`;
      if (results.length === 0) {
        html += `<div style="color:var(--text2);font-size: 15px">No modules matched your search. Try a keyword like "async", "React", or "database".</div>`;
      } else {
        html += `<div class="search-results">`;
        results.forEach(([num, mod]) => {
          const phase = getPhase(mod.phase);
          html += `<div class="search-result-item" onclick="document.getElementById('search').value='';navigate(${num})">
        <span class="sr-mod">M${String(num).padStart(2, '0')}</span>
        <span class="sr-name">${mod.title}</span>
        <span class="sr-phase" style="color:${phase.color};background:${phase.bg}">${phase.label}</span>
      </div>`;
        });
        html += `</div>`;
      }
      area.innerHTML = html;
    }

    document.getElementById('search').addEventListener('input', e => doSearch(e.target.value));

    document.getElementById('theme-btn').addEventListener('click', () => {
      lightMode = !lightMode;
      document.documentElement.classList.toggle('light', lightMode);
      localStorage.setItem('fs_theme', lightMode ? 'light' : 'dark');
      document.getElementById('theme-icon-dark').style.display = lightMode ? 'none' : 'block';
      document.getElementById('theme-icon-light').style.display = lightMode ? 'block' : 'none';
    });

    if (lightMode) {
      document.getElementById('theme-icon-dark').style.display = 'none';
      document.getElementById('theme-icon-light').style.display = 'block';
    }

    document.getElementById('logo-area').style.cursor = 'pointer';
    document.getElementById('logo-area').addEventListener('click', (e) => {
      if (e.target.closest('#sidebar-toggle')) return;
      navigate('dashboard');
    });

    document.getElementById('sidebar-toggle').addEventListener('click', (e) => {
      toggleSidebar();
    });

    document.getElementById('sidebar-backdrop').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('sidebar-backdrop').classList.remove('open');
    });

    buildSidebar();
    updateProgressBar();
    render();
  </script>
</body>

</html>
